<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>راديو القرآن | بث مباشر</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <!-- Header -->
        <div class="header">
            <h1>راديو القرآن</h1>
            <button id="settingsBtn" class="settings-glass">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 17.66a10 10 0 0 0 6.36-2.62l.04-.04Z"/>
                </svg>
            </button>
        </div>

        <!-- Settings Panel -->
        <div id="settingsContent" class="settings-glass-panel">
            <div class="settings-header">
                <span class="settings-title">الإعدادات</span>
                <button class="close-settings" id="closeSettings">✕</button>
            </div>
            <div class="setting-item">
                <div class="setting-label">🔗 API البث المباشر</div>
                <div class="setting-link-group">
                    <a href="#" id="apiLink" target="_blank" class="glass-link"></a>
                    <button class="glass-copy" data-target="apiUrl">نسخ</button>
                </div>
                <input type="text" id="apiUrl" class="hidden-input" readonly>
            </div>
            <div class="setting-item">
                <div class="setting-label">📖 قائمة السور</div>
                <div class="setting-link-group">
                    <a href="https://jsonkeeper.com/b/P07SJ" target="_blank" class="glass-link">jsonkeeper.com/b/P07SJ</a>
                    <button class="glass-copy" data-target="surahListUrl">نسخ</button>
                </div>
                <input type="text" id="surahListUrl" class="hidden-input" readonly value="https://jsonkeeper.com/b/P07SJ">
            </div>
            <div class="setting-item">
                <div class="setting-label">🐙 GitHub</div>
                <div class="setting-link-group">
                    <a href="https://github.com/X5Coder/Quran-Website-API" target="_blank" class="glass-link">github.com/X5Coder/Quran-Website-API</a>
                    <button class="glass-copy" data-target="githubUrl">نسخ</button>
                </div>
                <input type="text" id="githubUrl" class="hidden-input" readonly value="https://github.com/X5Coder/Quran-Website-API">
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading-glass">
            <div class="glass-spinner"></div>
            <p>جاري تحميل البث...</p>
        </div>
        
        <!-- Main Content -->
        <div id="content" class="hidden">
            <!-- Info Cards - iOS Style -->
            <div class="cards-grid">
                <div class="glass-card">
                    <div class="card-icon">📖</div>
                    <div class="card-label">السورة</div>
                    <div class="card-value" id="surah">-</div>
                </div>
                <div class="glass-card">
                    <div class="card-icon">🎙️</div>
                    <div class="card-label">القارئ</div>
                    <div class="card-value" id="reader">-</div>
                </div>
                <div class="glass-card">
                    <div class="card-icon">🔢</div>
                    <div class="card-label">رقم السورة</div>
                    <div class="card-value" id="surahNum">-</div>
                </div>
                <div class="glass-card">
                    <div class="card-icon">⏱️</div>
                    <div class="card-label">التقدم</div>
                    <div class="card-value" id="currentTime">00:00</div>
                    <div class="card-sub" id="duration">00:00</div>
                </div>
            </div>
            
            <!-- Progress Bar - iOS Style -->
            <div class="progress-section">
                <div class="progress-bar-glass" id="progressBar">
                    <div class="progress-fill-glass" id="progressFill"></div>
                </div>
                <div class="time-labels">
                    <span id="currentTimeLabel">00:00</span>
                    <span id="durationLabel">00:00</span>
                </div>
            </div>
            
            <!-- Controls - iOS Style -->
            <div class="controls-glass">
                <button id="playBtn" class="glass-action play-action">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/>
                    </svg>
                </button>
                <button id="muteBtn" class="glass-action">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                    </svg>
                </button>
            </div>
            
            <!-- JSON Data -->
            <div class="json-glass">
                <div class="json-header-glass">
                    <span>📋 البيانات الخام</span>
                </div>
                <pre id="jsonData"></pre>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>
    <script src="script.js"></script>
</body>
</html>
